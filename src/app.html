<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0c0a08" />
		<script>
			document.documentElement.classList.add('js');
			// Resolve the shared theme mode before first paint.
			(function () {
				var key = 'nullmenu-theme';
				var valid = function (value) {
					return value === 'system' || value === 'light' || value === 'dark';
				};
				var cookieMode = null;
				try {
					var cookie = document.cookie
						.split(';')
						.map(function (part) { return part.trim(); })
						.find(function (part) { return part.indexOf(key + '=') === 0; });
					if (cookie) {
						try { cookieMode = decodeURIComponent(cookie.slice(key.length + 1)); } catch (e) {}
					}
				} catch (e) {}
				var localMode = null;
				try { localMode = localStorage.getItem(key); } catch (e) {}
				var mode = valid(cookieMode) ? cookieMode : valid(localMode) ? localMode : 'system';
				var theme = mode === 'system'
					? (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
					: mode;
				document.documentElement.dataset.themeMode = mode;
				document.documentElement.dataset.theme = theme;
				if (theme === 'light') {
					document.querySelector('meta[name="theme-color"]').content = '#f2ead8';
				}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/InstrumentSerif-normal-400-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/InstrumentSerif-italic-400-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/Geist-normal-300_700-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/GeistMono-normal-400_600-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
