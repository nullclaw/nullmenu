name: Build & deploy the Null sites

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly: refresh baked-in release/download data

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Static and content checks
        run: pnpm check && pnpm check:content && pnpm test:unit && pnpm test:release

      - name: Verify pinned release assets
        if: github.event_name == 'schedule'
        run: pnpm test:release:network

      - name: Install browser for UI quality gates
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Build all sites
        run: node scripts/build-all.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run responsive and accessibility contracts
        run: pnpm exec playwright test

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-diagnostics
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      # apex — nullmenu.ai, served by this repo's GitHub Pages
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        if: github.event_name != 'pull_request'
        with:
          path: build/menu

      - name: Upload product builds
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: product-sites
          path: build/
          retention-days: 1

  deploy-apex:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  deploy-subdomains:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { site: claw, repo: nullclaw/nullclaw, domain: claw.nullmenu.ai }
          - { site: hub, repo: nullclaw/nullhub, domain: hub.nullmenu.ai }
          - { site: boiler, repo: nullclaw/nullboiler, domain: boiler.nullmenu.ai }
          - { site: tickets, repo: nullclaw/nulltickets, domain: tickets.nullmenu.ai }
          - { site: watch, repo: nullclaw/nullwatch, domain: watch.nullmenu.ai }
          - { site: pantry, repo: nullclaw/nullpantry, domain: pantry.nullmenu.ai }
          - { site: clw, repo: nullclaw/nllclw, domain: clw.nullmenu.ai }
          - { site: desk, repo: nullclaw/nulldesk, domain: desk.nullmenu.ai }
          - { site: cap, repo: nullclaw/nullcap, domain: cap.nullmenu.ai }
          - { site: builder, repo: nullclaw/nullbuilder, domain: builder.nullmenu.ai }
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: product-sites
          path: build

      - name: Deploy ${{ matrix.site }} → ${{ matrix.repo }}:gh-pages
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b # v4
        with:
          personal_token: ${{ secrets.NULLMENU_DEPLOY_TOKEN }}
          external_repository: ${{ matrix.repo }}
          publish_branch: gh-pages
          publish_dir: build/${{ matrix.site }}
          cname: ${{ matrix.domain }}
          force_orphan: true
          commit_message: 'deploy: ${{ matrix.domain }} from nullmenu@${{ github.sha }}'
